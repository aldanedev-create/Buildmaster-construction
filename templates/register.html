{% extends "includes/header.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create an Account</h2>
    
    <form method="POST" action="/register" data-validate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        
        <div class="form-group">
            <label for="name">Full Name *</label>
            <input type="text" name="name" id="name" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email Address *</label>
            <input type="email" name="email" id="email" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number *</label>
            <input type="tel" name="phone" id="phone" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" name="password" id="password" required>
            <small>Minimum 8 characters with uppercase, lowercase, number, and special character</small>
        </div>
        
        <div class="form-group">
            <label for="confirm_password">Confirm Password *</label>
            <input type="password" name="confirm_password" id="confirm_password" required>
        </div>
        
        <button type="submit" class="btn-primary btn-block">Register</button>
    </form>
    
    <div class="form-footer">
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</div>

<script>
document.querySelector('form')?.addEventListener('submit', function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    
    if (password !== confirm) {
        e.preventDefault();
        alert('Passwords do not match');
    }
});
</script>
{% endblock %}
